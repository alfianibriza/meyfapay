<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeyfaPay - Sistem Penggajian Kru Dekorasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; /* Lighter background for mobile */
            -webkit-tap-highlight-color: transparent;
        }
        
        .card { 
            background: white; 
            border-radius: 16px; 
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
        }
        
        /* Bottom Navigation Active State */
        .nav-link { color: #94a3b8; transition: all 0.2s ease; }
        .nav-link.active { color: #2563eb; font-weight: 600; }
        .nav-link i { transition: transform 0.2s ease; }
        .nav-link.active i { transform: scale(1.2); color: #2563eb; }
        
        .no-print { transition: all 0.2s; }
        [onclick] { cursor: pointer; }
        
        /* Modal Animation */
        .modal { transition: opacity 0.25s ease; z-index: 100; }
        body.modal-active { overflow: hidden; }

        /* Slip Gaji Styling */
        .slip-font { font-family: 'Courier Prime', monospace; }
        
        /* Safe Area Adjustments for iPhones */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        @media print {
            .no-print, header, nav { display: none !important; }
            body { background: white; padding: 0; }
            .print-only { display: block !important; }
            .main-content { padding: 0 !important; margin: 0 !important; }
            .card { border: none !important; box-shadow: none !important; }
            .modal { position: relative !important; opacity: 1 !important; pointer-events: auto !important; }
            .bg-opacity-80 { display: none !important; }
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <!-- Top App Bar -->
    <header class="fixed top-0 w-full bg-slate-900 text-white h-16 z-40 flex justify-between items-center px-5 shadow-lg no-print">
        <div class="font-bold text-xl flex items-center gap-2">
            <i class="fas fa-coins text-yellow-400"></i> MeyfaPay
        </div>
        <!-- Pintasan ke Jenis Pekerjaan agar bottom nav tidak terlalu penuh -->
        <button onclick="showPage('jenis-pekerjaan')" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors border border-slate-700">
            <i class="fas fa-tags text-amber-400"></i> Tarif
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="pt-20 pb-28 px-4 md:px-8 min-h-screen main-content max-w-2xl mx-auto">
        <div id="content-area">
            <!-- Content Injected Here -->
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center pt-2 pb-2 px-1 z-40 pb-safe shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] no-print">
        <button onclick="showPage('beranda')" class="nav-link active flex flex-col items-center p-2 w-full">
            <i class="fas fa-home text-xl mb-1"></i>
            <span class="text-[10px] uppercase tracking-wider">Beranda</span>
        </button>
        <button onclick="showPage('event')" class="nav-link flex flex-col items-center p-2 w-full">
            <i class="fas fa-calendar-alt text-xl mb-1"></i>
            <span class="text-[10px] uppercase tracking-wider">Event</span>
        </button>
        <button onclick="showPage('pekerja')" class="nav-link flex flex-col items-center p-2 w-full">
            <i class="fas fa-user-friends text-xl mb-1"></i>
            <span class="text-[10px] uppercase tracking-wider">Tim</span>
        </button>
        <button onclick="showPage('partisipasi')" class="nav-link flex flex-col items-center p-2 w-full">
            <i class="fas fa-clipboard-check text-xl mb-1"></i>
            <span class="text-[10px] uppercase tracking-wider">Absen</span>
        </button>
        <button onclick="showPage('rekap')" class="nav-link flex flex-col items-center p-2 w-full">
            <i class="fas fa-money-check-alt text-xl mb-1"></i>
            <span class="text-[10px] uppercase tracking-wider">Gaji</span>
        </button>
    </nav>

    <!-- Modal Event -->
    <div id="modal-event" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center">
        <div class="absolute w-full h-full bg-slate-900 bg-opacity-60 backdrop-blur-sm" onclick="toggleModal('modal-event')"></div>
        <div class="bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto transform transition-all">
            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <p class="text-xl font-bold text-slate-800" id="modal-event-title">Tambah Event</p>
                    <div class="cursor-pointer bg-slate-100 p-2 rounded-full h-8 w-8 flex items-center justify-center hover:bg-slate-200" onclick="toggleModal('modal-event')">
                        <i class="fas fa-times text-slate-500"></i>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="hidden" id="event-id">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Event</label>
                        <input type="text" id="event-nama" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors" placeholder="Contoh: Pernikahan Dinda">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tanggal</label>
                        <input type="date" id="event-tanggal" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Lokasi</label>
                        <input type="text" id="event-lokasi" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors" placeholder="Lokasi acara">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="toggleModal('modal-event')" class="flex-1 px-4 py-3.5 text-slate-600 bg-slate-100 rounded-xl font-bold hover:bg-slate-200 transition-colors">Batal</button>
                    <button onclick="saveEvent()" class="flex-1 px-4 py-3.5 bg-blue-600 rounded-xl text-white font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-colors">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Pekerja -->
    <div id="modal-pekerja" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center">
        <div class="absolute w-full h-full bg-slate-900 bg-opacity-60 backdrop-blur-sm" onclick="toggleModal('modal-pekerja')"></div>
        <div class="bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <p class="text-xl font-bold text-slate-800" id="modal-pekerja-title">Tambah Pekerja</p>
                    <div class="cursor-pointer bg-slate-100 p-2 rounded-full h-8 w-8 flex items-center justify-center hover:bg-slate-200" onclick="toggleModal('modal-pekerja')">
                        <i class="fas fa-times text-slate-500"></i>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="hidden" id="pekerja-id">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Lengkap</label>
                        <input type="text" id="pekerja-nama" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors" placeholder="Masukkan nama pekerja">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">No. WhatsApp</label>
                        <input type="tel" id="pekerja-telp" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors" placeholder="0812...">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="toggleModal('modal-pekerja')" class="flex-1 px-4 py-3.5 text-slate-600 bg-slate-100 rounded-xl font-bold hover:bg-slate-200 transition-colors">Batal</button>
                    <button onclick="savePekerja()" class="flex-1 px-4 py-3.5 bg-blue-600 rounded-xl text-white font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-colors">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Jenis Pekerjaan -->
    <div id="modal-job" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center">
        <div class="absolute w-full h-full bg-slate-900 bg-opacity-60 backdrop-blur-sm" onclick="toggleModal('modal-job')"></div>
        <div class="bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <p class="text-xl font-bold text-slate-800" id="modal-job-title">Tambah Jenis Kerja</p>
                    <div class="cursor-pointer bg-slate-100 p-2 rounded-full h-8 w-8 flex items-center justify-center hover:bg-slate-200" onclick="toggleModal('modal-job')">
                        <i class="fas fa-times text-slate-500"></i>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="hidden" id="job-id">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Kategori</label>
                        <input type="text" id="job-nama" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors" placeholder="Contoh: Tukang Kayu">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tarif Bayaran (Rp)</label>
                        <input type="number" id="job-tarif" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors" placeholder="Contoh: 150000">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="toggleModal('modal-job')" class="flex-1 px-4 py-3.5 text-slate-600 bg-slate-100 rounded-xl font-bold hover:bg-slate-200 transition-colors">Batal</button>
                    <button onclick="saveJob()" class="flex-1 px-4 py-3.5 bg-blue-600 rounded-xl text-white font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-colors">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Slip Gaji -->
    <div id="modal-slip" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center p-4">
        <div class="absolute w-full h-full bg-slate-900 bg-opacity-80 backdrop-blur-sm" onclick="toggleModal('modal-slip')"></div>
        <div class="bg-white w-full max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto relative p-6 max-h-[90vh]">
            <div class="absolute top-4 right-4 no-print">
                <button onclick="toggleModal('modal-slip')" class="bg-slate-100 text-slate-500 hover:bg-slate-200 h-8 w-8 rounded-full flex justify-center items-center"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="slip-content" class="slip-font text-slate-900 mt-2">
                <!-- Slip Content Injected Here -->
            </div>

            <div class="mt-8 pt-4 border-t border-dashed border-slate-300 flex flex-col gap-3 no-print">
                <button onclick="window.print()" class="w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-black transition-colors">
                    <i class="fas fa-print mr-2"></i> Cetak / Simpan PDF
                </button>
                <button onclick="toggleModal('modal-slip')" class="w-full bg-slate-100 text-slate-600 py-3.5 rounded-xl font-bold hover:bg-slate-200 transition-colors">
                    Tutup
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 hidden bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-[100] border border-slate-700 font-medium text-sm w-max transition-all duration-300">
        Berhasil!
    </div>

    <script>
        // --- DATA ENGINE ---
        let state = {
            events: JSON.parse(localStorage.getItem('ep_events')) || [],
            pekerja: JSON.parse(localStorage.getItem('ep_pekerja')) || [],
            jenisPekerjaan: JSON.parse(localStorage.getItem('ep_jobs')) || [],
            partisipasi: JSON.parse(localStorage.getItem('ep_partisipasi')) || [],
            selectedMonth: new Date().toISOString().slice(0, 7)
        };

        function saveState() {
            localStorage.setItem('ep_events', JSON.stringify(state.events));
            localStorage.setItem('ep_pekerja', JSON.stringify(state.pekerja));
            localStorage.setItem('ep_jobs', JSON.stringify(state.jenisPekerjaan));
            localStorage.setItem('ep_partisipasi', JSON.stringify(state.partisipasi));
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 ${isError ? 'bg-red-600 border-red-500' : 'bg-slate-800 border-slate-700'} text-white px-6 py-3 rounded-full shadow-2xl z-[100] font-medium text-sm w-max transition-all duration-300`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

        function toggleModal(modalId) {
            const modal = document.getElementById(modalId);
            if(!modal) return;
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
            document.body.classList.toggle('modal-active');
        }

        // --- ROUTER FIX ---
        function showPage(pageId) {
            const navLinks = document.querySelectorAll('.nav-link');
            const regex = new RegExp(`showPage\\(['"]${pageId}['"]\\)`);

            navLinks.forEach(link => {
                link.classList.remove('active');
                if(regex.test(link.getAttribute('onclick'))) {
                    link.classList.add('active');
                }
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });

            switch(pageId) {
                case 'beranda': renderBeranda(); break;
                case 'event': renderEvent(); break;
                case 'pekerja': renderPekerja(); break;
                case 'jenis-pekerjaan': renderJenisPekerjaan(); break;
                case 'partisipasi': renderPartisipasi(); break;
                case 'rekap': renderRekap(); break;
            }
        }

        // --- CRUD FUNCTIONS ---
        function openEventModal(id = null) {
            document.getElementById('modal-event-title').innerText = id ? 'Edit Event' : 'Tambah Event';
            document.getElementById('event-id').value = id || '';
            if(id) {
                const e = state.events.find(ev => ev.id == id);
                document.getElementById('event-nama').value = e.nama;
                document.getElementById('event-tanggal').value = e.tanggal;
                document.getElementById('event-lokasi').value = e.lokasi;
            } else {
                document.getElementById('event-nama').value = '';
                document.getElementById('event-tanggal').value = '';
                document.getElementById('event-lokasi').value = '';
            }
            toggleModal('modal-event');
        }

        function saveEvent() {
            const nama = document.getElementById('event-nama').value;
            const tanggal = document.getElementById('event-tanggal').value;
            if(!nama || !tanggal) return showToast('Nama dan Tanggal wajib diisi!', true);

            const id = document.getElementById('event-id').value;
            const data = {
                id: id || Date.now(),
                nama: nama,
                tanggal: tanggal,
                lokasi: document.getElementById('event-lokasi').value
            };
            
            if(id) {
                state.events = state.events.map(e => e.id == id ? data : e);
            } else {
                state.events.push(data);
            }
            saveState();
            toggleModal('modal-event');
            renderEvent();
            showToast("Event disimpan!");
        }

        function openPekerjaModal(id = null) {
            document.getElementById('modal-pekerja-title').innerText = id ? 'Edit Pekerja' : 'Tambah Pekerja';
            document.getElementById('pekerja-id').value = id || '';
            if(id) {
                const p = state.pekerja.find(pe => pe.id == id);
                document.getElementById('pekerja-nama').value = p.nama;
                document.getElementById('pekerja-telp').value = p.telepon;
            } else {
                document.getElementById('pekerja-nama').value = '';
                document.getElementById('pekerja-telp').value = '';
            }
            toggleModal('modal-pekerja');
        }

        function savePekerja() {
            const nama = document.getElementById('pekerja-nama').value;
            if(!nama) return showToast('Nama pekerja wajib diisi!', true);

            const id = document.getElementById('pekerja-id').value;
            const data = {
                id: id || Date.now(),
                nama: nama,
                telepon: document.getElementById('pekerja-telp').value
            };
            if(id) {
                state.pekerja = state.pekerja.map(p => p.id == id ? data : p);
            } else {
                state.pekerja.push(data);
            }
            saveState();
            toggleModal('modal-pekerja');
            renderPekerja();
            showToast("Pekerja disimpan!");
        }

        function openJobModal(id = null) {
            document.getElementById('modal-job-title').innerText = id ? 'Edit Kategori' : 'Tambah Kategori';
            document.getElementById('job-id').value = id || '';
            if(id) {
                const j = state.jenisPekerjaan.find(jo => jo.id == id);
                document.getElementById('job-nama').value = j.nama;
                document.getElementById('job-tarif').value = j.tarif;
            } else {
                document.getElementById('job-nama').value = '';
                document.getElementById('job-tarif').value = '';
            }
            toggleModal('modal-job');
        }

        function saveJob() {
            const nama = document.getElementById('job-nama').value;
            const tarif = document.getElementById('job-tarif').value;
            if(!nama || !tarif) return showToast('Semua kolom wajib diisi!', true);

            const id = document.getElementById('job-id').value;
            const data = {
                id: id || Date.now(),
                nama: nama,
                tarif: parseInt(tarif)
            };
            if(id) {
                state.jenisPekerjaan = state.jenisPekerjaan.map(j => j.id == id ? data : j);
            } else {
                state.jenisPekerjaan.push(data);
            }
            saveState();
            toggleModal('modal-job');
            renderJenisPekerjaan();
            showToast("Tarif disimpan!");
        }

        function deleteGeneral(key, id) {
            if(!confirm("Hapus data ini?")) return;
            state[key] = state[key].filter(i => i.id != id);
            saveState();
            showPage(key == 'events' ? 'event' : (key == 'jenisPekerjaan' ? 'jenis-pekerjaan' : 'pekerja'));
        }

        function savePartisipasi() {
            const eventId = document.getElementById('sel-event').value;
            const workerId = document.getElementById('sel-worker').value;
            const jobId = document.getElementById('sel-job').value;

            if(!eventId || !workerId || !jobId) return showToast('Lengkapi semua data!', true);

            const data = { eventId, workerId, jobId };
            state.partisipasi.push(data);
            saveState();
            renderPartisipasi();
            showToast("Kehadiran dicatat!");
        }

        function deletePartisipasi(idx) {
            if(!confirm("Hapus catatan ini?")) return;
            state.partisipasi.splice(idx, 1);
            saveState();
            renderPartisipasi();
        }

        // --- RENDERERS (Optimized for Mobile) ---
        function renderBeranda() {
            const totalGaji = state.partisipasi.reduce((acc, curr) => {
                const job = state.jenisPekerjaan.find(j => j.id == curr.jobId);
                return acc + (job ? job.tarif : 0);
            }, 0);

            document.getElementById('content-area').innerHTML = `
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-slate-800">Dashboard</h1>
                    <p class="text-slate-500 text-sm">Ringkasan operasional Anda</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="card p-4">
                        <div class="h-10 w-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-3 text-lg">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <p class="text-slate-500 text-xs font-bold uppercase mb-1">Event</p>
                        <h3 class="text-2xl font-bold text-slate-800">${state.events.length}</h3>
                    </div>
                    <div class="card p-4">
                        <div class="h-10 w-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-3 text-lg">
                            <i class="fas fa-users"></i>
                        </div>
                        <p class="text-slate-500 text-xs font-bold uppercase mb-1">Tim</p>
                        <h3 class="text-2xl font-bold text-slate-800">${state.pekerja.length}</h3>
                    </div>
                </div>
                <div class="card p-5 bg-gradient-to-br from-slate-800 to-slate-900 text-white mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-slate-300 text-xs font-bold uppercase tracking-wider">Total Kas Keluar</p>
                        <i class="fas fa-wallet text-slate-400"></i>
                    </div>
                    <h3 class="text-3xl font-bold text-yellow-400">${formatIDR(totalGaji)}</h3>
                    <p class="text-xs text-slate-400 mt-2">Sepanjang masa</p>
                </div>
                
                <h2 class="text-lg font-bold text-slate-800 mb-4">Aksi Cepat</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="showPage('partisipasi')" class="card p-4 flex flex-col items-center justify-center text-center hover:bg-slate-50 transition-colors">
                        <i class="fas fa-clipboard-list text-2xl text-blue-500 mb-2"></i>
                        <span class="text-sm font-semibold text-slate-700">Catat Absen</span>
                    </button>
                    <button onclick="showPage('rekap')" class="card p-4 flex flex-col items-center justify-center text-center hover:bg-slate-50 transition-colors">
                        <i class="fas fa-file-invoice-dollar text-2xl text-emerald-500 mb-2"></i>
                        <span class="text-sm font-semibold text-slate-700">Cetak Gaji</span>
                    </button>
                </div>
            `;
        }

        function renderEvent() {
            document.getElementById('content-area').innerHTML = `
                <div class="flex justify-between items-center mb-5">
                    <h1 class="text-2xl font-bold text-slate-800">Daftar Event</h1>
                </div>
                
                <button onclick="openEventModal()" class="w-full bg-blue-600 text-white px-5 py-3.5 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 mb-6 flex justify-center items-center gap-2">
                    <i class="fas fa-plus"></i> Tambah Event Baru
                </button>

                <div class="space-y-3">
                    ${state.events.map(e => `
                        <div class="card p-4 flex justify-between items-center border-l-4 border-blue-500">
                            <div class="pr-2">
                                <h3 class="font-bold text-slate-800 text-[16px] leading-snug mb-1">${e.nama}</h3>
                                <p class="text-[12px] text-slate-500 mb-0.5"><i class="fas fa-calendar-alt w-4 text-slate-400"></i> ${e.tanggal}</p>
                                ${e.lokasi ? `<p class="text-[12px] text-slate-500"><i class="fas fa-map-marker-alt w-4 text-slate-400"></i> ${e.lokasi}</p>` : ''}
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="openEventModal('${e.id}')" class="h-10 w-10 bg-slate-100 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-50"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteGeneral('events', '${e.id}')" class="h-10 w-10 bg-slate-100 text-red-500 rounded-full flex items-center justify-center hover:bg-red-50"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('') || '<div class="text-center p-10 text-slate-400 bg-white border border-dashed rounded-xl border-slate-300">Belum ada event</div>'}
                </div>
            `;
        }

        function renderPekerja() {
            document.getElementById('content-area').innerHTML = `
                <div class="flex justify-between items-center mb-5">
                    <h1 class="text-2xl font-bold text-slate-800">Tim Pekerja</h1>
                </div>

                <button onclick="openPekerjaModal()" class="w-full bg-emerald-600 text-white px-5 py-3.5 rounded-xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 mb-6 flex justify-center items-center gap-2">
                    <i class="fas fa-user-plus"></i> Tambah Anggota Tim
                </button>

                <div class="space-y-3">
                    ${state.pekerja.map(p => `
                        <div class="card p-4 flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <div class="h-12 w-12 bg-gradient-to-br from-emerald-100 to-emerald-200 text-emerald-700 rounded-full flex items-center justify-center font-bold text-xl shrink-0">
                                    ${p.nama.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <h3 class="font-bold text-slate-800 text-[16px]">${p.nama}</h3>
                                    <p class="text-[12px] text-slate-500 mt-0.5"><i class="fas fa-phone-alt w-3 mr-1 text-slate-400"></i> ${p.telepon || '-'}</p>
                                </div>
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="openPekerjaModal('${p.id}')" class="h-10 w-10 bg-slate-100 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-50"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteGeneral('pekerja', '${p.id}')" class="h-10 w-10 bg-slate-100 text-red-500 rounded-full flex items-center justify-center hover:bg-red-50"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('') || '<div class="text-center p-10 text-slate-400 bg-white border border-dashed rounded-xl border-slate-300">Belum ada pekerja</div>'}
                </div>
            `;
        }

        function renderJenisPekerjaan() {
            document.getElementById('content-area').innerHTML = `
                <div class="mb-5">
                    <button onclick="showPage('beranda')" class="text-slate-500 hover:text-slate-800 mb-2 inline-block"><i class="fas fa-arrow-left mr-1"></i> Kembali</button>
                    <h1 class="text-2xl font-bold text-slate-800">Tarif Pekerjaan</h1>
                </div>

                <button onclick="openJobModal()" class="w-full bg-amber-500 text-white px-5 py-3.5 rounded-xl font-bold shadow-lg shadow-amber-200 hover:bg-amber-600 mb-6 flex justify-center items-center gap-2">
                    <i class="fas fa-plus"></i> Tambah Kategori Tarif
                </button>

                <div class="space-y-3">
                    ${state.jenisPekerjaan.map(j => `
                        <div class="card p-4 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-slate-800 mb-1">${j.nama}</h3>
                                <div class="bg-emerald-50 text-emerald-700 font-bold px-2 py-1 rounded-md text-sm inline-block">
                                    ${formatIDR(j.tarif)}
                                </div>
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="openJobModal('${j.id}')" class="h-10 w-10 bg-slate-100 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-50"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteGeneral('jenisPekerjaan', '${j.id}')" class="h-10 w-10 bg-slate-100 text-red-500 rounded-full flex items-center justify-center hover:bg-red-50"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('') || '<div class="text-center p-10 text-slate-400 bg-white border border-dashed rounded-xl border-slate-300">Belum ada tarif</div>'}
                </div>
            `;
        }

        function renderPartisipasi() {
            document.getElementById('content-area').innerHTML = `
                <h1 class="text-2xl font-bold text-slate-800 mb-5">Catat Kehadiran</h1>
                
                <div class="card p-5 bg-white border-2 border-slate-100 mb-8 no-print">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Pilih Event</label>
                            <select id="sel-event" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none appearance-none">
                                ${state.events.length ? '' : '<option value="">-- Tambah Event Dulu --</option>'}
                                ${state.events.map(e => `<option value="${e.id}">${e.nama} (${e.tanggal})</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Pekerja</label>
                            <select id="sel-worker" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none appearance-none">
                                ${state.pekerja.length ? '' : '<option value="">-- Tambah Pekerja Dulu --</option>'}
                                ${state.pekerja.map(p => `<option value="${p.id}">${p.nama}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tugas & Tarif</label>
                            <select id="sel-job" class="w-full p-3.5 border rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none appearance-none">
                                ${state.jenisPekerjaan.length ? '' : '<option value="">-- Tambah Tarif Dulu --</option>'}
                                ${state.jenisPekerjaan.map(j => `<option value="${j.id}">${j.nama} - ${formatIDR(j.tarif)}</option>`).join('')}
                            </select>
                        </div>
                        <button onclick="savePartisipasi()" class="w-full bg-slate-900 text-white p-4 rounded-xl hover:bg-black font-bold text-sm mt-2 shadow-lg">
                            <i class="fas fa-check-circle mr-2"></i> Simpan Catatan
                        </button>
                    </div>
                </div>

                <h2 class="text-lg font-bold text-slate-800 mb-4">Riwayat Terakhir</h2>
                <div class="space-y-3">
                    ${state.partisipasi.map((p, idx) => {
                        const event = state.events.find(e => e.id == p.eventId);
                        const worker = state.pekerja.find(w => w.id == p.workerId);
                        const job = state.jenisPekerjaan.find(j => j.id == p.jobId);
                        return `
                            <div class="card p-4 relative overflow-hidden">
                                <div class="absolute right-0 top-0 h-full w-2 ${job ? 'bg-emerald-400' : 'bg-slate-300'}"></div>
                                <div class="flex justify-between items-start mb-2 pr-4">
                                    <h3 class="font-bold text-slate-800">${worker?.nama || 'Terhapus'}</h3>
                                    <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">${formatIDR(job?.tarif || 0)}</span>
                                </div>
                                <p class="text-xs text-slate-500 mb-1"><i class="fas fa-calendar-day w-4"></i> ${event?.nama || 'Terhapus'}</p>
                                <p class="text-xs text-slate-500"><i class="fas fa-briefcase w-4"></i> ${job?.nama || 'Terhapus'}</p>
                                
                                <button onclick="deletePartisipasi(${idx})" class="absolute bottom-3 right-4 text-slate-300 hover:text-red-500 p-2">
                                    <i class="fas fa-trash-alt text-lg"></i>
                                </button>
                            </div>
                        `;
                    }).reverse().join('') || '<div class="text-center p-8 text-slate-400">Belum ada data kehadiran</div>'}
                </div>
            `;
        }

        function renderRekap() {
            const rekap = {};
            const filterMonth = state.selectedMonth; // Format: YYYY-MM

            // Proses perhitungan rekap
            state.partisipasi.forEach(p => {
                const event = state.events.find(e => e.id == p.eventId);
                // Cek apakah event ada dan bulannya sesuai dengan filter
                if (event && event.tanggal.startsWith(filterMonth)) {
                    if(!rekap[p.workerId]) {
                        rekap[p.workerId] = { id: p.workerId, total: 0, count: 0, items: [] };
                    }
                    const job = state.jenisPekerjaan.find(j => j.id == p.jobId);
                    if (job) {
                        rekap[p.workerId].total += job.tarif;
                        rekap[p.workerId].count += 1;
                        rekap[p.workerId].items.push({ event, job });
                    }
                }
            });

            const rekapList = Object.values(rekap);

            document.getElementById('content-area').innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold text-slate-800">Rekap Gaji</h1>
                    <input type="month" id="filter-bulan" value="${filterMonth}" onchange="changeMonth(this.value)" class="p-2 border border-slate-300 rounded-lg bg-white shadow-sm outline-none text-sm font-bold text-slate-700">
                </div>
                
                <div class="space-y-4">
                    ${rekapList.length > 0 ? rekapList.map(r => {
                        const worker = state.pekerja.find(w => w.id == r.id);
                        return `
                        <div class="card p-5">
                            <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
                                <div>
                                    <h3 class="font-bold text-slate-800 text-lg">${worker?.nama || 'Pekerja Dihapus'}</h3>
                                    <p class="text-xs text-slate-500 mt-1"><i class="fas fa-tasks mr-1"></i> ${r.count} Pekerjaan</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] uppercase font-bold text-slate-400">Total Dibayar</p>
                                    <h2 class="text-xl font-bold text-emerald-600">${formatIDR(r.total)}</h2>
                                </div>
                            </div>
                            <button onclick="cetakSlip('${r.id}')" class="w-full bg-slate-800 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-md hover:bg-slate-900 transition-colors flex justify-center items-center gap-2">
                                <i class="fas fa-file-invoice"></i> Lihat / Cetak Slip
                            </button>
                        </div>
                        `;
                    }).join('') : `
                        <div class="text-center p-12 bg-white rounded-2xl border border-dashed border-slate-300">
                            <i class="fas fa-folder-open text-4xl text-slate-300 mb-3"></i>
                            <p class="text-slate-500">Tidak ada tagihan gaji pada bulan ini.</p>
                        </div>
                    `}
                </div>
            `;
        }

        // --- FUNGSI TAMBAHAN (Bulan & Cetak Slip) ---
        function changeMonth(val) {
            if(!val) return;
            state.selectedMonth = val;
            saveState();
            renderRekap();
        }

        function cetakSlip(workerId) {
            const worker = state.pekerja.find(w => w.id == workerId);
            const filterMonth = state.selectedMonth;
            
            // Ambil data detail pekerjaan
            const rekapData = state.partisipasi.filter(p => p.workerId == workerId).reduce((acc, p) => {
                 const event = state.events.find(e => e.id == p.eventId);
                 if(event && event.tanggal.startsWith(filterMonth)) {
                     const job = state.jenisPekerjaan.find(j => j.id == p.jobId);
                     if(job) acc.push({ event, job });
                 }
                 return acc;
            }, []);

            const total = rekapData.reduce((sum, item) => sum + item.job.tarif, 0);

            let html = `
                <div class="text-center mb-6 border-b-2 border-black pb-4">
                    <h2 class="text-2xl font-bold uppercase tracking-widest">SLIP GAJI</h2>
                    <p class="text-sm mt-1">Meyfa Wedding & Decoration</p>
                    <p class="text-xs mt-1">Periode: ${filterMonth}</p>
                </div>
                <div class="mb-6 text-sm space-y-1">
                    <p><strong>Nama Pekerja :</strong> ${worker?.nama || '-'}</p>
                    <p><strong>No. Telp     :</strong> ${worker?.telepon || '-'}</p>
                </div>
                <table class="w-full text-left border-collapse mb-8 text-sm">
                    <thead>
                        <tr class="border-y-2 border-black">
                            <th class="py-2 pr-2">Deskripsi</th>
                            <th class="py-2 text-right">Nominal</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-300 border-b-2 border-black">
                        ${rekapData.map(item => `
                            <tr>
                                <td class="py-3 pr-2">
                                    <div class="font-bold">${item.job.nama}</div>
                                    <div class="text-xs mt-1 text-gray-600">${item.event.nama} (${item.event.tanggal})</div>
                                </td>
                                <td class="py-3 text-right whitespace-nowrap">${formatIDR(item.job.tarif)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                    <tfoot>
                        <tr class="font-bold">
                            <td class="py-3 text-right pr-4 text-base">TOTAL TERIMA :</td>
                            <td class="py-3 text-right text-lg">${formatIDR(total)}</td>
                        </tr>
                    </tfoot>
                </table>
                <div class="flex justify-between mt-12 text-center text-sm">
                    <div class="w-1/2">
                        <p class="mb-20">Penerima,</p>
                        <p class="font-bold underline">${worker?.nama || '..........'}</p>
                    </div>
                    <div class="w-1/2">
                        <p class="mb-20">Mengetahui,</p>
                        <p class="font-bold underline">Meyfa Dekorasi</p>
                    </div>
                </div>
            `;
            
            document.getElementById('slip-content').innerHTML = html;
            toggleModal('modal-slip');
        }

        // Init Aplikasi
        window.onload = () => {
            showPage('beranda');
        };
    </script>
</body>
</html>
